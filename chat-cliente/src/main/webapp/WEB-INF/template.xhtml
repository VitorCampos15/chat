<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets">

<h:head>
    <meta charset="UTF-8"/>
    <title><ui:insert name="title">Chat</ui:insert></title>
    <ui:insert name="extraHead"/>
    <style type="text/css">
        body { font-family: system-ui, sans-serif; margin: 0; min-height: 100vh; display: flex; flex-direction: column; }
        .top-bar {
            background: #1e293b;
            color: #f8fafc;
            padding: 0.75rem 1.25rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 1rem;
            justify-content: space-between;
        }
        .top-bar nav { display: flex; gap: 1rem; align-items: center; }
        .top-bar nav a { color: #93c5fd; text-decoration: none; font-weight: 500; }
        .top-bar nav a:hover { text-decoration: underline; }
        .top-bar nav .logout-form,
        .top-bar nav .logout-form a { color: #93c5fd; text-decoration: none; font-weight: 500; }
        .top-bar nav .logout-form a:hover { text-decoration: underline; }
        .config-form { display: flex; flex-wrap: wrap; align-items: center; gap: 0.5rem; }
        .config-form label { font-size: 0.85rem; color: #cbd5e1; }
        .config-form input { padding: 0.25rem 0.5rem; border-radius: 4px; border: 1px solid #475569; background: #0f172a; color: #f8fafc; }
        .page-body {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            gap: 1rem;
            padding: 1rem;
            align-items: start;
            box-sizing: border-box;
            min-height: 0;
        }
        .log-panel {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            min-width: 0;
        }
        .log-panel h2 {
            margin: 0;
            font-size: 0.95rem;
            font-weight: 600;
            color: #334155;
        }
        .log-json {
            display: block;
            background: #1e1e1e;
            color: #7ee787;
            font-family: ui-monospace, "Cascadia Code", "Source Code Pro", Menlo, Consolas, monospace;
            font-size: 0.75rem;
            line-height: 1.45;
            padding: 0.75rem;
            border-radius: 8px;
            border: 1px solid #333;
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow-wrap: break-word;
            overflow-x: auto;
            min-height: 8rem;
            max-height: calc(100vh - 10rem);
            overflow-y: auto;
        }
        .main-content {
            min-width: 0;
            max-width: 36rem;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }
        .field { margin-bottom: 0.75rem; }
        .field label { display: block; margin-bottom: 0.25rem; }
        .messages { margin-top: 0; margin-bottom: 1rem; }
        @media (max-width: 900px) {
            .page-body { grid-template-columns: 1fr; }
            .log-json { max-height: 12rem; }
        }
    </style>
</h:head>

<h:body>
    <h:form id="formPrincipal">
        <header class="top-bar">
            <nav>
                <h:link outcome="login" value="Login"/>
                <h:link outcome="cadastro" value="Cadastro"/>
                <h:link outcome="consulta" value="Consultar Usuário"/>
                <h:link outcome="atualizar" value="Atualizar Perfil"/>
                <h:link outcome="deletar" value="Excluir Conta"/>
                <h:link outcome="admin" value="Painel Admin"/>
                <h:commandLink id="linkSair" value="Sair" action="#{usuarioBean.realizarLogout()}"
                               styleClass="logout-form"/>
            </nav>
            <div class="config-form">
                <h:outputLabel for="cfgIp" value="IP"/>
                <h:inputText id="cfgIp" value="#{configuracaoBean.ip}" size="14" title="Endereço do servidor"/>
                <h:outputLabel for="cfgPorta" value="Porta"/>
                <h:inputText id="cfgPorta" value="#{configuracaoBean.porta}" size="6" title="Porta TCP"/>
                <h:outputLabel for="tokenTeste" value="Token Atual de Teste"/>
                <h:inputText id="tokenTeste" value="#{usuarioBean.tokenRecebido}" size="28"
                             title="Token enviado nas operações autenticadas (editável para testes)"/>
                <h:commandButton id="btnAplicarConfig" value="Aplicar" action="#{configuracaoBean.salvarConfiguracao()}"/>
                <h:commandButton id="btnDesconectarTcp" value="Desconectar" action="#{usuarioBean.desconectarTcp()}"
                                 rendered="#{usuarioBean.tcpConectado}"/>
            </div>
        </header>

        <div class="page-body">
            <aside class="log-panel log-panel-enviado">
                <h2>Último JSON Enviado</h2>
                <h:panelGroup id="painelJsonEnviado" layout="block">
                    <h:outputText id="txtJsonEnviado" value="#{usuarioBean.jsonEnviado}" styleClass="log-json"/>
                </h:panelGroup>
            </aside>
            <main class="main-content">
                <h:messages id="msgs" showSummary="true" showDetail="true" layout="list" styleClass="messages"/>
                <ui:insert name="conteudo"/>
            </main>
            <aside class="log-panel log-panel-recebido">
                <h2>Último JSON Recebido</h2>
                <h:panelGroup id="painelJsonRecebido" layout="block">
                    <h:outputText id="txtJsonRecebido" value="#{usuarioBean.jsonRecebido}" styleClass="log-json"/>
                </h:panelGroup>
            </aside>
        </div>
    </h:form>
</h:body>
</html>
